<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskersky</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Taskersky | Personal Task Tracker</h1>
    <button class="btn-open" onclick="toggleModal(true)">+ Add New Task</button>

    <div id="task-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>New task</h2>
            <input type="text" id="task-title" placeholder="Task Title (min 3 chars)">
            <textarea id="task-desc" placeholder="Description (optional)"></textarea>
            
            <div class="modal-buttons">
                <button class="btn-save" onclick="createTask()">Save Task</button>
                <button class="btn-cancel" onclick="toggleModal(false)">Cancel</button>
            </div>
        </div>
    </div>

    <div id="tasks-container">Loading tasks..</div>
    <script src="scripts.js"></script>
</body>
</html>
